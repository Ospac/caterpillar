name: CI

on:
  pull_request:
    branches: [main, develop, feature/**]

jobs:
  ci:
    name: React CI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Biome check
        run: pnpm check

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build
